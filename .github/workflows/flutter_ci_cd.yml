name: Flutter CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  setup:
    name: Setup Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.8'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Create Artefact
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          tar -czf /tmp/${GITHUB_SHA}.tar.gz --exclude=.git --exclude=.github .
          mv /tmp/${GITHUB_SHA}.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: app-setup
          path: ./${{ github.sha }}.tar.gz
          retention-days: 0
  qa-check:
    needs: [setup]
    name: Quality Assurance (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
      - uses: actions/download-artifact@v4
      - with:
          name: app-setup
          path: ./

      - name: Extract Artefact
        run: tar -xzf ./${{ github.sha }}.tar.gz -C .

      - name: Analyze code
        run: flutter analyze

      - name: Run Tests
        run: flutter test